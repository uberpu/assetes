<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Continuous AI</h1>
            <p>A minimalist Tic-Tac-Toe agent trained via GitHub Actions.</p>
        </header>

        <div class="controls">
            <select id="brain-select">
                <option value="random">Loading...</option>
            </select>
            <button id="reset-btn">Reset</button>
            <button id="logs-btn">Logs</button>
            <button id="docs-btn">Docs</button>
            <button id="how-it-works-btn">About</button>
        </div>

        <div class="game-area">
            <div id="status" class="status">Your turn (X)</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>
    </div>

    <!-- Modal Background -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body" class="markdown-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
